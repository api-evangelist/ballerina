naftiko: "1.0.0-alpha1"

info:
  label: "Ballerina Package Registry"
  description: >-
    Ballerina Central package registry workflow for discovering, searching, and retrieving
    Ballerina language packages. Serves Ballerina developers and integration engineers building
    on the Ballerina language ecosystem.
  tags:
    - Ballerina
    - Package Registry
    - Integration
    - Open Source
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      BALLERINA_TOKEN: BALLERINA_TOKEN

capability:
  consumes:
    - import: ballerina-central
      location: ./shared/central-api.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: ballerina-registry-api
      description: "Unified REST API for Ballerina package registry."
      resources:
        - path: /v1/packages
          name: packages
          description: Package discovery and search
          operations:
            - method: GET
              name: search-packages
              description: Search for Ballerina packages
              call: "ballerina-central.search-packages"
              with:
                q: "rest.q"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/packages/{org}/{package}
          name: package
          description: Package details
          operations:
            - method: GET
              name: get-package
              description: Get package details
              call: "ballerina-central.get-package"
              with:
                org: "rest.org"
                package: "rest.package"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9080
      namespace: ballerina-registry-mcp
      transport: http
      description: "MCP server for AI-assisted Ballerina package discovery."
      tools:
        - name: search-ballerina-packages
          description: Search for Ballerina packages in the Central registry by name, keyword, or organization
          hints:
            readOnly: true
            openWorld: true
          call: "ballerina-central.search-packages"
          with:
            q: "tools.q"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-ballerina-package
          description: Get details about a specific Ballerina package including versions and documentation
          hints:
            readOnly: true
            openWorld: true
          call: "ballerina-central.get-package"
          with:
            org: "tools.org"
            package: "tools.package"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-ballerina-package-version
          description: Get details about a specific version of a Ballerina package
          hints:
            readOnly: true
            openWorld: true
          call: "ballerina-central.get-package-version"
          with:
            org: "tools.org"
            package: "tools.package"
            version: "tools.version"
          outputParameters:
            - type: object
              mapping: "$."
