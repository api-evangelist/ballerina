naftiko: "1.0.0-alpha1"

info:
  label: "Ballerina Central API"
  description: "Ballerina Central REST API for discovering, publishing, and managing Ballerina packages in the central package registry."
  tags:
    - Ballerina
    - Package Registry
    - Integration
    - Open Source
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      BALLERINA_TOKEN: BALLERINA_TOKEN

capability:
  consumes:
    - type: http
      namespace: ballerina-central
      baseUri: https://api.central.ballerina.io
      description: "Ballerina Central package registry API"
      authentication:
        type: bearer
        token: "{{BALLERINA_TOKEN}}"
      resources:
        - name: packages
          path: /2.0/packages
          description: Package search and discovery
          operations:
            - name: search-packages
              method: GET
              description: Search for packages in Ballerina Central
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: false
                  description: Search query
                - name: page
                  in: query
                  type: integer
                  required: false
                - name: page-size
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-package
              method: GET
              description: Get details about a specific package
              inputParameters:
                - name: org
                  in: path
                  type: string
                  required: true
                - name: package
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-package-version
              method: GET
              description: Get a specific version of a package
              inputParameters:
                - name: org
                  in: path
                  type: string
                  required: true
                - name: package
                  in: path
                  type: string
                  required: true
                - name: version
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8130
      namespace: ballerina-central-rest
      resources:
        - path: /v1/packages
          name: packages
          description: Package search and discovery
          operations:
            - method: GET
              name: search-packages
              description: Search Ballerina Central packages
              call: "ballerina-central.search-packages"
              with:
                q: "rest.q"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9130
      namespace: ballerina-central-mcp
      transport: http
      tools:
        - name: search-packages
          description: Search for Ballerina packages in Central registry
          hints:
            readOnly: true
            openWorld: true
          call: "ballerina-central.search-packages"
          with:
            q: "tools.q"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-package
          description: Get details about a specific Ballerina package
          hints:
            readOnly: true
            openWorld: true
          call: "ballerina-central.get-package"
          with:
            org: "tools.org"
            package: "tools.package"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-package-version
          description: Get a specific version of a Ballerina package
          hints:
            readOnly: true
            openWorld: true
          call: "ballerina-central.get-package-version"
          with:
            org: "tools.org"
            package: "tools.package"
            version: "tools.version"
          outputParameters:
            - type: object
              mapping: "$."
